<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória: Consciência Alimentar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Conserve o Futuro 🍎</h1>
        <p>Combine os pares e descubra como o desperdício de alimentos afeta o nosso planeta e a agricultura!</p>
    </header>

    <div class="score-container">
        <div class="score-box">Movimentos: <span id="moves">0</span></div>
        <div class="score-box">Acertos: <span id="matches">0</span>/6</div>
        <button id="reset-btn">Reiniciar Jogo</button>
    </div>

    <main class="game-container">
        <div class="memory-game" id="game-board">
            </div>
    </main>

    <footer>
        <p>Pense bem antes de descartar. Pequenas ações salvam o meio ambiente!</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
